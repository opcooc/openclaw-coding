<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作台 - 华规绩效考评系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex h-screen">
        <aside class="w-64 bg-blue-700 text-white flex-shrink-0">
            <div class="p-4 bg-white rounded-lg mx-3 mb-4 mt-4">
                <img src="../images/huagui-logo.png" alt="华规软件" class="w-full h-auto">
            </div>
            <nav class="mt-2">
                <a href="02-workbench.html" class="flex items-center px-6 py-3 bg-blue-600 border-l-4 border-white"><i class="fas fa-home w-6"></i><span>工作台</span></a>
                <a href="03-task-submission.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors"><i class="fas fa-edit w-6"></i><span>任务填报</span></a>
                <a href="04-supervisor-rating.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors"><i class="fas fa-star w-6"></i><span>上级打分</span></a>
                <a href="05-score-query.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors"><i class="fas fa-chart-line w-6"></i><span>成绩查询</span></a>
                <a href="06-admin-config.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors"><i class="fas fa-cog w-6"></i><span>系统配置</span></a>
                <a href="07-report-analysis.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors"><i class="fas fa-file-alt w-6"></i><span>报表中心</span></a>
            </nav>
        </aside>
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm border-b px-6 py-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-semibold text-gray-800">工作台</h2>
                    <div class="flex items-center space-x-4">
                        <div class="flex items-center space-x-2">
                            <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center text-white font-medium">张</div>
                            <span class="text-gray-700">张三</span>
                        </div>
                        <a href="01-login.html" class="text-gray-500 hover:text-red-600 transition-colors"><i class="fas fa-sign-out-alt"></i><span class="ml-1">退出</span></a>
                    </div>
                </div>
            </header>
            <main class="flex-1 overflow-y-auto p-6">
                <div class="grid grid-cols-3 gap-6">
                    <div class="col-span-2 space-y-6">
                        <div class="grid grid-cols-3 gap-4">
                            <div class="bg-white rounded-lg shadow p-4 border-l-4 border-yellow-500">
                                <div class="flex items-center justify-between">
                                    <div><p class="text-gray-500 text-xs">待填报</p><p class="text-2xl font-bold text-gray-800 mt-1">5</p></div>
                                    <div class="w-10 h-10 bg-yellow-100 rounded-full flex items-center justify-center"><i class="fas fa-edit text-yellow-600 text-lg"></i></div>
                                </div>
                            </div>
                            <div class="bg-white rounded-lg shadow p-4 border-l-4 border-blue-500">
                                <div class="flex items-center justify-between">
                                    <div><p class="text-gray-500 text-xs">待审核</p><p class="text-2xl font-bold text-gray-800 mt-1">3</p></div>
                                    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center"><i class="fas fa-check-circle text-blue-600 text-lg"></i></div>
                                </div>
                            </div>
                            <div class="bg-white rounded-lg shadow p-4 border-l-4 border-green-500">
                                <div class="flex items-center justify-between">
                                    <div><p class="text-gray-500 text-xs">待打分</p><p class="text-2xl font-bold text-gray-800 mt-1">8</p></div>
                                    <div class="w-10 h-10 bg-green-100 rounded-full flex items-center justify-center"><i class="fas fa-star text-green-600 text-lg"></i></div>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white rounded-lg shadow p-4">
                            <h3 class="text-sm font-semibold text-gray-700 mb-3">快捷入口</h3>
                            <div class="grid grid-cols-4 gap-3">
                                <button class="flex flex-col items-center p-3 border rounded-lg hover:bg-blue-50 hover:border-blue-300 transition-colors">
                                    <div class="w-8 h-8 bg-blue-100 rounded-lg flex items-center justify-center mb-2"><i class="fas fa-plus text-blue-600 text-sm"></i></div>
                                    <span class="text-xs text-gray-700">新建考核</span>
                                </button>
                                <button class="flex flex-col items-center p-3 border rounded-lg hover:bg-green-50 hover:border-green-300 transition-colors">
                                    <div class="w-8 h-8 bg-green-100 rounded-lg flex items-center justify-center mb-2"><i class="fas fa-upload text-green-600 text-sm"></i></div>
                                    <span class="text-xs text-gray-700">批量导入</span>
                                </button>
                                <button class="flex flex-col items-center p-3 border rounded-lg hover:bg-purple-50 hover:border-purple-300 transition-colors">
                                    <div class="w-8 h-8 bg-purple-100 rounded-lg flex items-center justify-center mb-2"><i class="fas fa-download text-purple-600 text-sm"></i></div>
                                    <span class="text-xs text-gray-700">导出报表</span>
                                </button>
                                <button class="flex flex-col items-center p-3 border rounded-lg hover:bg-orange-50 hover:border-orange-300 transition-colors">
                                    <div class="w-8 h-8 bg-orange-100 rounded-lg flex items-center justify-center mb-2"><i class="fas fa-bell text-orange-600 text-sm"></i></div>
                                    <span class="text-xs text-gray-700">消息通知</span>
                                </button>
                            </div>
                        </div>
                        <div class="bg-white rounded-lg shadow p-4">
                            <h3 class="text-sm font-semibold text-gray-700 mb-3">考核进度</h3>
                            <div>
                                <div class="flex justify-between mb-2"><span class="text-sm text-gray-700">2026 年第一季度考核</span><span class="text-xs text-gray-500">截止：2026-04-30</span></div>
                                <div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-blue-600 h-2 rounded-full" style="width: 65%"></div></div>
                                <p class="text-xs text-gray-500 mt-1">当前进度：65%</p>
                            </div>
                        </div>
                    </div>
                    <div class="col-span-1">
                        <div class="bg-white rounded-lg shadow p-4 h-full">
                            <h3 class="text-sm font-semibold text-gray-700 mb-3 flex items-center"><i class="fas fa-bullhorn text-blue-600 mr-2"></i>通知公告</h3>
                            <div class="space-y-3">
                                <div class="border-l-4 border-red-500 pl-3 py-2 bg-red-50 rounded-r"><p class="text-sm font-medium text-gray-800">关于完成 Q1 绩效考核的通知</p><p class="text-xs text-gray-500 mt-1">2026-04-15</p></div>
                                <div class="border-l-4 border-blue-500 pl-3 py-2 bg-blue-50 rounded-r"><p class="text-sm font-medium text-gray-800">系统维护公告</p><p class="text-xs text-gray-500 mt-1">2026-04-10</p></div>
                                <div class="border-l-4 border-green-500 pl-3 py-2 bg-green-50 rounded-r"><p class="text-sm font-medium text-gray-800">绩效考核制度更新说明</p><p class="text-xs text-gray-500 mt-1">2026-04-05</p></div>
                                <div class="border-l-4 border-purple-500 pl-3 py-2 bg-purple-50 rounded-r"><p class="text-sm font-medium text-gray-800">新员工培训安排</p><p class="text-xs text-gray-500 mt-1">2026-04-01</p></div>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
