<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>组织关系 - 华规绩效考评系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex h-screen">
        <aside class="w-64 bg-blue-700 text-white flex-shrink-0">
            <div class="p-4 mx-3 mb-2 mt-4"><img src="../images/huagui-logo.png?v=20260417" alt="华规软件" class="w-full h-auto"></div>
            <nav class="mt-2">
        <a href="02-workbench.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors">
            <i class="fas fa-home w-6"></i>
            <span>工作台</span>
        </a>
        <a href="03-task-submission.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors">
            <i class="fas fa-edit w-6"></i>
            <span>任务填报</span>
        </a>
        <a href="08-subordinate-evaluation.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors">
            <i class="fas fa-users w-6"></i>
            <span>下属考核</span>
        </a>
        <a href="07-report-analysis.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors">
            <i class="fas fa-file-alt w-6"></i>
            <span>报表中心</span>
        </a>
        <a href="06-admin-config.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors">
            <i class="fas fa-cog w-6"></i>
            <span>系统配置</span>
        </a>
        <a href="09-user-management.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors">
            <i class="fas fa-user-cog w-6"></i>
            <span>用户管理</span>
        </a>
        <a href="11-org-structure.html" class="flex items-center px-6 py-3 bg-blue-600 border-l-4 border-white">
            <i class="fas fa-sitemap w-6"></i>
            <span>组织关系</span>
        </a>
    </nav>

    </nav>
        </aside>
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm border-b px-6 py-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-semibold text-gray-800">组织关系管理</h2>
                    <div class="flex items-center space-x-4">
                        <span class="text-gray-600">管理员</span>
                        <a href="01-login.html" class="text-gray-500 hover:text-red-600"><i class="fas fa-sign-out-alt"></i><span class="ml-1">退出</span></a>
                    </div>
                </div>
            </header>
            <main class="flex-1 overflow-y-auto p-6">
                <div class="grid grid-cols-3 gap-6">
                    <div class="col-span-1">
                        <div class="bg-white rounded-lg shadow">
                            <div class="p-4 border-b flex justify-between items-center">
                                <h3 class="text-lg font-semibold text-gray-800">部门列表</h3>
                                <button class="bg-green-600 text-white px-3 py-1.5 rounded-lg hover:bg-green-700 text-sm" onclick="showAddModal()"><i class="fas fa-plus mr-1"></i>新增</button>
                            </div>
                            <div class="p-4" id="deptList">
                                <div class="border rounded-lg p-3 hover:bg-blue-50 cursor-pointer bg-blue-50">
                                    <div class="flex items-center justify-between">
                                        <div class="flex items-center space-x-2">
                                            <i class="fas fa-building text-blue-600"></i>
                                            <span class="font-medium text-gray-800">研发中心</span>
                                        </div>
                                        <div class="flex space-x-2">
                                            <button class="text-blue-600 hover:text-blue-700" onclick="editDept('研发中心')"><i class="fas fa-edit"></i></button>
                                            <button class="text-red-600 hover:text-red-700" onclick="deleteDept('研发中心')"><i class="fas fa-trash"></i></button>
                                        </div>
                                    </div>
                                    <div class="text-xs text-gray-500 mt-1 ml-6">45 人</div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-span-2">
                        <div class="bg-white rounded-lg shadow">
                            <div class="p-4 border-b"><h3 class="text-lg font-semibold text-gray-800">研发中心 - 考核关系配置</h3></div>
                            <div class="p-4">
                                <table class="w-full">
                                    <thead class="bg-gray-50">
                                        <tr>
                                            <th class="text-left py-3 px-4 text-sm font-medium text-gray-700">被考核人</th>
                                            <th class="text-left py-3 px-4 text-sm font-medium text-gray-700">岗位</th>
                                            <th class="text-center py-3 px-4 text-sm font-medium text-gray-700">直接上级</th>
                                            <th class="text-center py-3 px-4 text-sm font-medium text-gray-700">考核权重</th>
                                            <th class="text-center py-3 px-4 text-sm font-medium text-gray-700">操作</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr class="border-b"><td class="py-3 px-4">李晓明</td><td class="text-gray-600">高级软件工程师</td><td class="text-center"><span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-sm">张志强</span></td><td class="text-center text-sm text-gray-600">100%</td><td class="text-center"><button class="text-blue-600 text-sm">编辑</button></td></tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <div id="addModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg shadow-xl w-96 p-6">
            <h3 class="text-lg font-semibold text-gray-800 mb-4">新增部门</h3>
            <div class="space-y-4">
                <div><label class="block text-sm text-gray-700 mb-2">部门名称</label><input type="text" id="deptName" class="w-full border rounded-lg px-4 py-2"></div>
            </div>
            <div class="flex justify-end gap-3 mt-6">
                <button class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg" onclick="hideAddModal()">取消</button>
                <button class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700" onclick="addDept()">确定</button>
            </div>
        </div>
    </div>
    <script>
        function showAddModal(){document.getElementById('addModal').classList.remove('hidden');}
        function hideAddModal(){document.getElementById('addModal').classList.add('hidden');}
        function addDept(){alert('新增部门：'+document.getElementById('deptName').value);hideAddModal();}
        function editDept(name){alert('编辑部门：'+name);}
        function deleteDept(name){if(confirm('确定删除'+name+'?'))alert('删除部门：'+name);}
    </script>
</body>
</html>
