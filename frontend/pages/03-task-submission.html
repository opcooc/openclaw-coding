<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月度重点任务填报 - 绩效考核系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        input:focus, textarea:focus {
            outline: none;
            border-color: #3b82f6;
            ring: 2px;
            ring-color: #3b82f6;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
        <!-- 页面头部 -->
        <div class="mb-8 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-gray-900">月度重点任务填报</h1>
            <button onclick="window.location.href='02-workbench.html'" class="text-sm text-blue-600 hover:text-blue-800 flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                </svg>
                返回工作台
            </button>
        </div>

        <form id="taskForm" class="space-y-6">
            <!-- 重点任务 1-5 -->
            <div id="tasks-container" class="space-y-6">
                <!-- 动态生成 5 个任务项 -->
                <script>
                    const container = document.currentScript.parentElement;
                    const tasks = [1, 2, 3, 4, 5];
                    tasks.forEach(i => {
                        const taskHtml = `
                            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                                <h3 class="text-lg font-semibold text-gray-800 mb-4 flex items-center">
                                    <span class="bg-blue-100 text-blue-600 w-6 h-6 rounded-full flex items-center justify-center text-xs mr-2 font-bold">${i}</span>
                                    重点任务 ${i}
                                </h3>
                                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <div class="md:col-span-2">
                                        <label class="block text-sm font-medium text-gray-700 mb-1">任务名称</label>
                                        <input type="text" name="task_name_${i}" placeholder="请输入任务名称" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                    </div>
                                    <div class="md:col-span-1">
                                        <label class="block text-sm font-medium text-gray-700 mb-1">完成标准</label>
                                        <textarea name="standard_${i}" rows="3" placeholder="请描述具体完成指标" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"></textarea>
                                    </div>
                                    <div class="md:col-span-1">
                                        <label class="block text-sm font-medium text-gray-700 mb-1">自评分 (0-100)</label>
                                        <input type="number" name="score_${i}" min="0" max="100" placeholder="请输入分数" class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500">
                                        <p class="mt-2 text-xs text-gray-500 italic">注：请根据实际完成情况客观评分</p>
                                    </div>
                                </div>
                            </div>
                        `;
                        document.write(taskHtml);
                    });
                </script>
            </div>

            <!-- 操作按钮 -->
            <div class="flex justify-end space-x-4 pt-4 border-t border-gray-200 pb-10">
                <button type="button" onclick="window.history.back()" class="px-6 py-2 border border-gray-300 rounded-md text-gray-700 bg-white hover:bg-gray-50 transition duration-150">
                    返回
                </button>
                <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 shadow-md transition duration-150">
                    提交填报
                </button>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('taskForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('绩效任务已提交！');
            window.location.href = '02-workbench.html';
        });
    </script>
</body>
</html>
