<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>任务填报 - 华规绩效考评系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex h-screen">
        <!-- 侧边栏 - 蓝色主题 -->
        <aside class="w-64 bg-blue-700 text-white flex-shrink-0">
            <div class="p-6 border-b border-blue-600">
                <div class="flex items-center space-x-3 mb-4">
                    <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center">
                        <span class="text-blue-700 font-bold text-xl">H</span>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold">华规软件</h1>
                        <p class="text-xs text-blue-200">绩效考评系统</p>
                    </div>
                </div>
            </div>
            <nav class="mt-6">
                <a href="02-workbench.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors">
                    <i class="fas fa-home w-6"></i>
                    <span>工作台</span>
                </a>
                <a href="03-task-submission.html" class="flex items-center px-6 py-3 bg-blue-600 border-l-4 border-white">
                    <i class="fas fa-edit w-6"></i>
                    <span>任务填报</span>
                </a>
                <a href="04-supervisor-rating.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors">
                    <i class="fas fa-star w-6"></i>
                    <span>上级打分</span>
                </a>
                <a href="05-score-query.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors">
                    <i class="fas fa-chart-line w-6"></i>
                    <span>成绩查询</span>
                </a>
                <a href="06-admin-config.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors">
                    <i class="fas fa-cog w-6"></i>
                    <span>系统配置</span>
                </a>
                <a href="07-report-analysis.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors">
                    <i class="fas fa-file-alt w-6"></i>
                    <span>报表中心</span>
                </a>
            </nav>
        </aside>

        <!-- 主内容区 -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm border-b px-6 py-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-semibold text-gray-800">重点任务填报</h2>
                    <div class="flex items-center space-x-4">
                        <span class="text-gray-600">李晓明 - 高级软件工程师</span>
                        <a href="01-login.html" class="text-gray-500 hover:text-red-600">
                            <i class="fas fa-sign-out-alt"></i>
                            <span class="ml-1">退出</span>
                        </a>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto p-6">
                <div class="max-w-4xl mx-auto">
                    <div class="bg-white rounded-lg shadow p-6 mb-6">
                        <p class="text-gray-600">每月初填报本月重点任务，最多可添加 5 项</p>
                    </div>

                    <div class="bg-white rounded-lg shadow p-6 mb-6">
                        <label class="block text-sm font-medium text-gray-700 mb-2">考核周期</label>
                        <select class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500">
                            <option value="2026-04">2026 年 4 月</option>
                            <option value="2026-05">2026 年 5 月</option>
                        </select>
                    </div>

                    <div class="bg-white rounded-lg shadow p-6 mb-6">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">添加新任务</h3>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">任务名称</label>
                                <input type="text" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="请输入任务名称">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">任务内容描述</label>
                                <textarea rows="3" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="请详细描述任务内容"></textarea>
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">交付成果</label>
                                <input type="text" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="请输入预期交付成果">
                            </div>
                            <div>
                                <label class="block text-sm font-medium text-gray-700 mb-1">预计完成百分比：<span class="text-blue-600 font-bold">100%</span></label>
                                <input type="range" min="1" max="100" value="100" class="w-full h-2 bg-gray-200 rounded-lg accent-blue-600">
                            </div>
                            <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg transition-colors">
                                <i class="fas fa-plus mr-2"></i>添加任务
                            </button>
                        </div>
                    </div>

                    <div class="bg-white rounded-lg shadow p-6 mb-6">
                        <h3 class="text-lg font-semibold text-gray-800 mb-4">已添加任务 <span class="text-sm font-normal text-gray-500">(0/5)</span></h3>
                        <p class="text-gray-400 text-center py-8">暂无任务，请添加</p>
                    </div>

                    <div class="bg-white rounded-lg shadow p-6">
                        <button class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-3 px-4 rounded-lg transition-colors">
                            提交任务
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
