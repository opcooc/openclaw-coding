<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上级打分 - 绩效考核系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <div class="flex">
        <!-- 侧边栏/下属列表 -->
        <div class="w-80 bg-white h-screen shadow-lg fixed overflow-y-auto">
            <div class="p-6 border-b">
                <h2 class="text-xl font-bold text-gray-800">下属考核列表</h2>
            </div>
            <div class="p-4 space-y-3">
                <!-- 张三 -->
                <div class="p-4 rounded-lg bg-gray-100 border-l-4 border-green-500 cursor-pointer hover:bg-gray-200 transition">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-semibold text-gray-800">张三</span>
                        <span class="text-xs px-2 py-1 bg-green-100 text-green-700 rounded-full">已填报</span>
                    </div>
                    <div class="text-sm text-gray-500">技术执行人员</div>
                </div>

                <!-- 李四 -->
                <div class="p-4 rounded-lg bg-gray-100 border-l-4 border-green-500 cursor-pointer hover:bg-gray-200 transition">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-semibold text-gray-800">李四</span>
                        <span class="text-xs px-2 py-1 bg-green-100 text-green-700 rounded-full">已填报</span>
                    </div>
                    <div class="text-sm text-gray-500">项目经理</div>
                </div>

                <!-- 王五 (选中状态) -->
                <div class="p-4 rounded-lg bg-blue-50 border-l-4 border-blue-600 cursor-pointer shadow-sm">
                    <div class="flex justify-between items-center mb-1">
                        <span class="font-semibold text-blue-800">王五</span>
                        <span class="text-xs px-2 py-1 bg-yellow-100 text-yellow-700 rounded-full">待填报</span>
                    </div>
                    <div class="text-sm text-blue-600">技术主管</div>
                </div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="ml-80 flex-1 p-8">
            <div class="max-w-4xl mx-auto">
                <div class="flex justify-between items-center mb-8">
                    <div>
                        <h1 class="text-2xl font-bold text-gray-800">上级打分卡</h1>
                        <p class="text-gray-500 mt-1">正在为 <span class="text-blue-600 font-medium">王五 (技术主管)</span> 进行绩效评分</p>
                    </div>
                    <button onclick="window.history.back()" class="flex items-center text-gray-600 hover:text-blue-600 transition">
                        <i class="fas fa-arrow-left mr-2"></i> 返回
                    </button>
                </div>

                <!-- 评分表单 -->
                <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                    <div class="p-6 border-b bg-gray-50">
                        <h3 class="font-bold text-gray-700">考核维度评分</h3>
                    </div>
                    
                    <form id="ratingForm" class="p-6 space-y-8">
                        <!-- 经营指标评分 -->
                        <div class="space-y-4">
                            <div class="flex justify-between items-center">
                                <label class="block text-sm font-bold text-gray-700">1. 经营指标评分 (权重 40%)</label>
                                <span class="text-xs text-gray-400">范围: 0-100</span>
                            </div>
                            <input type="number" id="score1" min="0" max="100" placeholder="请输入分数"
                                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition score-input"
                                required>
                            <p class="text-xs text-gray-500 italic">考核关键财务指标、成本控制及部门预算达成情况。</p>
                        </div>

                        <!-- 关键任务评分 -->
                        <div class="space-y-4">
                            <div class="flex justify-between items-center">
                                <label class="block text-sm font-bold text-gray-700">2. 关键任务评分 (权重 40%)</label>
                                <span class="text-xs text-gray-400">范围: 0-100</span>
                            </div>
                            <input type="number" id="score2" min="0" max="100" placeholder="请输入分数"
                                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition score-input"
                                required>
                            <p class="text-xs text-gray-500 italic">考核季度核心项目进度、研发里程碑达成率及技术突破。</p>
                        </div>

                        <!-- 能力态度评分 -->
                        <div class="space-y-4">
                            <div class="flex justify-between items-center">
                                <label class="block text-sm font-bold text-gray-700">3. 能力态度评分 (权重 20%)</label>
                                <span class="text-xs text-gray-400">范围: 0-100</span>
                            </div>
                            <input type="number" id="score3" min="0" max="100" placeholder="请输入分数"
                                class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition score-input"
                                required>
                            <p class="text-xs text-gray-500 italic">考核团队协作、价值观认同及个人专业能力成长。</p>
                        </div>

                        <!-- 评语 -->
                        <div class="space-y-2 pt-4">
                            <label class="block text-sm font-bold text-gray-700">综合评语</label>
                            <textarea rows="4" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition" placeholder="请填写对该员工的综合评价及改进建议..."></textarea>
                        </div>
                    </form>

                    <!-- 总分显示 -->
                    <div class="bg-blue-600 p-8 flex justify-between items-center text-white">
                        <div>
                            <p class="text-blue-100 text-sm mb-1">加权计算总得分</p>
                            <p class="text-xs opacity-75">(S1*0.4 + S2*0.4 + S3*0.2)</p>
                        </div>
                        <div class="text-center">
                            <span id="totalScore" class="text-5xl font-black">0</span>
                            <span class="ml-2 text-xl">分</span>
                        </div>
                    </div>
                </div>

                <!-- 底部操作栏 -->
                <div class="mt-8 flex justify-end space-x-4">
                    <button type="button" onclick="window.history.back()" class="px-8 py-3 rounded-lg border border-gray-300 text-gray-600 font-medium hover:bg-gray-100 transition">
                        取消
                    </button>
                    <button type="button" onclick="submitForm()" class="px-10 py-3 bg-blue-600 text-white rounded-lg font-bold shadow-lg hover:bg-blue-700 transform hover:-translate-y-1 transition">
                        确认提交
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputs = document.querySelectorAll('.score-input');
        const totalDisplay = document.getElementById('totalScore');

        function calculateTotal() {
            const s1 = parseFloat(document.getElementById('score1').value) || 0;
            const s2 = parseFloat(document.getElementById('score2').value) || 0;
            const s3 = parseFloat(document.getElementById('score3').value) || 0;

            // 加权计算: 40% + 40% + 20%
            const total = (s1 * 0.4) + (s2 * 0.4) + (s3 * 0.2);
            
            // 动画效果更新数值
            totalDisplay.innerText = total.toFixed(1);
            
            // 根据分数改变颜色
            if(total >= 90) totalDisplay.classList.add('text-yellow-300');
            else totalDisplay.classList.remove('text-yellow-300');
        }

        inputs.forEach(input => {
            input.addEventListener('input', calculateTotal);
        });

        function submitForm() {
            const total = totalDisplay.innerText;
            if(total == "0.0") {
                alert("请先填写评分数据");
                return;
            }
            alert("评分提交成功！最终得分：" + total);
            window.location.href = '02-workbench.html';
        }
    </script>
</body>
</html>
