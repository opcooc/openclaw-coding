<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>成绩查询 - 华规绩效考评系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="flex h-screen">
        <aside class="w-64 bg-blue-700 text-white flex-shrink-0">
    <div class="p-4 bg-white rounded-lg mx-3 mb-4 mt-4">
        <img src="../images/huagui-logo.png" alt="华规软件" class="w-full h-auto">
    </div>
    <nav class="mt-2">
        <a href="02-workbench.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors"><i class="fas fa-home w-6"></i><span>工作台</span></a>
        <a href="03-task-submission.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors"><i class="fas fa-edit w-6"></i><span>任务填报</span></a>
        <a href="05-score-query.html" class="flex items-center px-6 py-3 bg-blue-600 border-l-4 border-white"><i class="fas fa-chart-line w-6"></i><span>成绩查询</span></a>
        <a href="06-admin-config.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors"><i class="fas fa-cog w-6"></i><span>系统配置</span></a>
        <a href="07-report-analysis.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors"><i class="fas fa-file-alt w-6"></i><span>报表中心</span></a>
        <a href="08-subordinate-evaluation.html" class="flex items-center px-6 py-3 hover:bg-blue-600 transition-colors"><i class="fas fa-users w-6"></i><span>下属考核</span></a>
    </nav>
</aside>
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white shadow-sm border-b px-6 py-4">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-semibold text-gray-800">个人成绩查询</h2>
                    <div class="flex items-center space-x-4"><span class="text-gray-600">李晓明</span><a href="01-login.html" class="text-gray-500 hover:text-red-600"><i class="fas fa-sign-out-alt"></i><span class="ml-1">退出</span></a></div>
                </div>
            </header>
            <main class="flex-1 overflow-y-auto p-6">
                <div class="max-w-6xl mx-auto">
                    <div class="bg-white rounded-lg shadow p-4 mb-6">
                        <div class="flex gap-4">
                            <div><label class="block text-sm text-gray-600 mb-1">考核年度</label><select class="border rounded px-3 py-2"><option>2026 年</option><option>2025 年</option></select></div>
                            <div><label class="block text-sm text-gray-600 mb-1">考核周期</label><select class="border rounded px-3 py-2"><option>全部</option><option>第一季度</option></select></div>
                            <div class="flex items-end"><button class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700"><i class="fas fa-search mr-2"></i>查询</button></div>
                        </div>
                    </div>
                    <div class="bg-white rounded-lg shadow mb-6">
                        <div class="p-4 border-b"><h3 class="text-lg font-semibold">考核成绩汇总</h3></div>
                        <table class="w-full">
                            <thead class="bg-gray-50"><tr><th class="text-left py-3 px-4 text-sm font-medium text-gray-700">周期</th><th class="text-center py-3 px-4 text-sm font-medium text-gray-700">关键任务</th><th class="text-center py-3 px-4 text-sm font-medium text-gray-700">能力态度</th><th class="text-center py-3 px-4 text-sm font-medium text-gray-700">经营指标</th><th class="text-center py-3 px-4 text-sm font-medium text-gray-700">总分</th><th class="text-center py-3 px-4 text-sm font-medium text-gray-700">等级</th><th class="text-center py-3 px-4 text-sm font-medium text-gray-700">操作</th></tr></thead>
                            <tbody>
                                <tr class="border-b"><td class="py-3 px-4">2026-03</td><td class="text-center">54.0</td><td class="text-center">18.5</td><td class="text-center">19.0</td><td class="text-center font-bold text-blue-600">91.5</td><td class="text-center"><span class="px-2 py-1 bg-green-100 text-green-700 rounded text-sm">A</span></td><td class="text-center"><button class="text-blue-600 text-sm">详情</button></td></tr>
                                <tr class="border-b"><td class="py-3 px-4">2026-02</td><td class="text-center">51.0</td><td class="text-center">17.0</td><td class="text-center">18.5</td><td class="text-center font-bold text-blue-600">86.5</td><td class="text-center"><span class="px-2 py-1 bg-blue-100 text-blue-700 rounded text-sm">B</span></td><td class="text-center"><button class="text-blue-600 text-sm">详情</button></td></tr>
                                <tr><td class="py-3 px-4">2026-01</td><td class="text-center">55.5</td><td class="text-center">19.0</td><td class="text-center">20.0</td><td class="text-center font-bold text-blue-600">94.5</td><td class="text-center"><span class="px-2 py-1 bg-green-100 text-green-700 rounded text-sm">A</span></td><td class="text-center"><button class="text-blue-600 text-sm">详情</button></td></tr>
                            </tbody>
                        </table>
                    </div>
                    <div class="bg-white rounded-lg shadow p-6">
                        <h3 class="text-lg font-semibold mb-4">绩效等级说明</h3>
                        <div class="grid grid-cols-4 gap-4">
                            <div class="text-center p-4 bg-green-50 rounded"><div class="text-2xl font-bold text-green-600">A</div><div class="text-sm text-gray-600 mt-1">90-100 分</div><div class="text-xs text-gray-500 mt-2">优秀</div></div>
                            <div class="text-center p-4 bg-blue-50 rounded"><div class="text-2xl font-bold text-blue-600">B</div><div class="text-sm text-gray-600 mt-1">80-89 分</div><div class="text-xs text-gray-500 mt-2">良好</div></div>
                            <div class="text-center p-4 bg-yellow-50 rounded"><div class="text-2xl font-bold text-yellow-600">C</div><div class="text-sm text-gray-600 mt-1">70-79 分</div><div class="text-xs text-gray-500 mt-2">合格</div></div>
                            <div class="text-center p-4 bg-red-50 rounded"><div class="text-2xl font-bold text-red-600">D</div><div class="text-sm text-gray-600 mt-1">0-69 分</div><div class="text-xs text-gray-500 mt-2">待改进</div></div>
                        </div>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
